/* ---- طلب استئذان: يعتمد على وقت الصلاة الفعلي ووقت المجلس الحسيني الرباني ---- */
function buildRequestText(sup, occasion, names){
  if(names.length===0) return 'اختر الأعضاء الذين تريد الاستئذان لهم بالضغط على (+) أمام كل اسم أدناه.';
  return `نستأذن لحضور ${occasion.label}${occasion.timeLabel? ' (الساعة '+occasion.timeLabel+')':''}\nالمجموعة: ${sup.fullName}\nالأعضاء (${names.length}): ${names.join('، ')}`;
}

function renderPermissionPanel(sup){
  cleanupExpiredRequests().then(changed=>{ if(changed) render(); });
  const today = todayStr();
  if(!prayerTimesCache || prayerTimesCache.date!==today){
    const loadingPanel = el(`<div class="card"><div class="empty-state">جاري تحديد وقت الصلاة تلقائياً من الإنترنت...</div></div>`);
    getPrayerTimes().then(()=>render());
    return loadingPanel;
  }

  const occasion = getCurrentOccasion(prayerTimesCache.timings);
  const myRequests = (DB.requests||[]).filter(r=>r.supervisorId===sup.id);
  const wrap = el(`<div></div>`);

  if(!occasion){
    const panel = el(`<div class="card">
      <div class="card-head"><div><h2>طلب استئذان</h2><div class="sub">لا توجد نافذة استئذان تلقائية مفتوحة الآن</div></div></div>
      <div class="empty-state">الاستئذان التلقائي متاح فقط قرب وقت صلاة المغرب (من الساعة ١٢ ظهرًا وحتى أذان المغرب)، أو خلال وقت المجلس الحسيني الرباني (من ${formatTime12(DB.majlisStart)} إلى ${formatTime12(DB.majlisEnd)})، أو قبل صلاة الجمعة بساعة يوم الجمعة. يمكنك دائماً إرسال طلب استئذان خاص أدناه.</div>
    </div>`);
    wrap.appendChild(panel);
  } else {
    const names = sup.members.filter(m=>selectedForRequest.has(m.id)).map(m=>m.name);
    const panel = el(`<div class="card">
      <div class="card-head"><div><h2>طلب استئذان</h2><div class="sub">${occasion.label} — ${occasion.timeLabel||''}</div></div></div>
      <div class="share-preview">${buildRequestText(sup, occasion, names)}</div>
      <div id="permMemberList"></div>
      <button class="btn btn-primary no-print" id="sendReqBtn" ${names.length===0?'disabled':''} style="margin-top:14px">إرسال الطلب إلى الأدمن</button>
    </div>`);

    const list = panel.querySelector('#permMemberList');
    if(sup.members.length===0){
      list.appendChild(el(`<div class="empty-state">أضف أعضاء إلى مجموعتك أولاً من تبويب «أعضاء المجموعة».</div>`));
    } else {
      sup.members.forEach(m=>{
        const isSel = selectedForRequest.has(m.id);
        const row = el(`<div class="member-row">
          <div class="member-info"><b>${m.name}</b><span>${m.phone||'بدون رقم'}</span></div>
          <button type="button" class="check-btn ${isSel?'present':''}" data-id="${m.id}">${isSel?'✓':'+'}</button>
        </div>`);
        row.querySelector('button').addEventListener('click',()=>{
          if(selectedForRequest.has(m.id)) selectedForRequest.delete(m.id); else selectedForRequest.add(m.id);
          render();
        });
        list.appendChild(row);
      });
    }

    panel.querySelector('#sendReqBtn').addEventListener('click', async ()=>{
      const ids = Array.from(selectedForRequest);
      if(ids.length===0) return;
      const selNames = sup.members.filter(m=>ids.includes(m.id)).map(m=>m.name);
      const {data, error} = await sb.from('requests').insert({
        supervisor_id: sup.id, occasion: occasion.label, member_ids: ids, member_names: selNames, status:'pending'
      }).select().single();
      if(error){ console.error(error); alert('تعذر إرسال الطلب، حاول مرة أخرى'); return; }
      if(data) DB.requests.unshift(mapRequestRow(data));
      selectedForRequest = new Set();
      render();
    });
    wrap.appendChild(panel);
  }

  wrap.appendChild(buildCustomRequestCard(sup));
  wrap.appendChild(buildRequestHistoryCard(myRequests));
  return wrap;
}

/* بطاقة طلب استئذان خاص حر النص، متاحة دائماً بغض النظر عن الوقت */
function buildCustomRequestCard(sup){
  const card = el(`<div class="card" style="margin-top:20px">
    <div class="card-head"><div><h2>طلب استئذان خاص</h2><div class="sub">لأي استئذان آخر غير مرتبط بوقت محدد، اكتب طلبك وأرسله مباشرة للأدمن</div></div></div>
    <div class="field"><label>نص الطلب</label><textarea id="customReqText" rows="3" placeholder="مثال: نستأذن بتأخير الحلقة اليوم بسبب ..."></textarea></div>
    <button class="btn btn-primary btn-sm no-print" id="sendCustomReqBtn">إرسال الطلب الخاص</button>
    <div class="error-msg" id="customReqErr"></div>
  </div>`);
  card.querySelector('#sendCustomReqBtn').addEventListener('click', async ()=>{
    const textarea = card.querySelector('#customReqText');
    const val = textarea.value.trim();
    const err = card.querySelector('#customReqErr');
    if(!val){ err.textContent = 'اكتب نص الطلب أولاً'; return; }
    const {data, error} = await sb.from('requests').insert({
      supervisor_id: sup.id, occasion:'طلب استئذان خاص', member_ids:[], member_names:[], note:val, status:'pending'
    }).select().single();
    if(error){ console.error(error); err.textContent = 'تعذر إرسال الطلب، حاول مرة أخرى'; return; }
    if(data) DB.requests.unshift(mapRequestRow(data));
    textarea.value = '';
    err.textContent = '';
    render();
  });
  return card;
}

function buildRequestHistoryCard(myRequests){
  const card = el(`<div class="card" style="margin-top:20px">
    <div class="card-head"><div><h2>سجل الطلبات السابقة</h2><div class="sub">حالة الطلبات المرسلة للأدمن الرئيسي</div></div></div>
    <div id="reqHistWrap"></div>
  </div>`);
  const wrap = card.querySelector('#reqHistWrap');
  if(myRequests.length===0){
    wrap.appendChild(el(`<div class="empty-state">لم يتم إرسال أي طلب استئذان بعد.</div>`));
  } else {
    myRequests.slice(0,30).forEach(r=>{
      const isPending = r.status==='pending';
      const isPrivate = r.occasion==='طلب استئذان خاص';
      const hasMembers = r.memberNames && r.memberNames.length>0;
      const detail = hasMembers ? r.memberNames.join('، ') : '';
      const row = el(`<div class="member-row">
        <div class="member-info"><b>${r.occasion}${detail? ' — '+detail : ''}</b><span>${new Date(r.createdAt).toLocaleString('ar-IQ')}</span></div>
        <span class="badge ${isPending?'badge-dim':'badge-green'}">${isPending?'⏳ قيد الانتظار':'✅ تمت الموافقة'}</span>
      </div>`);
      const info = row.querySelector('.member-info');
      if(!hasMembers && r.note) info.appendChild(buildExpandableNote(r.note, 110));
      /* طلب استئذان خاص لم يُردّ عليه بعد: يمكن للمسؤول تعديله أو حذفه بنفسه */
      if(isPrivate && isPending){
        const noteText = el(`<div class="field" id="reqEditWrap_${r.id}" style="display:none; margin-top:8px"><textarea id="reqEditTxt_${r.id}" rows="2">${escapeHtml(r.note||'')}</textarea></div>`);
        info.appendChild(noteText);
        const actionsBar = el(`<div class="share-btns no-print" style="margin-top:8px"></div>`);
        const editBtn = el(`<button type="button" class="btn btn-ghost btn-sm">✎ تعديل</button>`);

        editBtn.addEventListener('click', ()=>{
          noteText.style.display = 'block';
          editBtn.style.display = 'none';
          saveBtn.style.display = '';
        });
        saveBtn.addEventListener('click', async ()=>{
          const val = row.querySelector(`#reqEditTxt_${r.id}`).value.trim();
          if(!val){ alert('اكتب نص الطلب أولاً'); return; }
          if(await editRequestNote(r.id, val)) render();
        });
        delBtn.addEventListener('click', async ()=>{
          if(!confirm('هل تريد حذف هذا الطلب؟')) return;
          if(await deleteRequestById(r.id)) render();
        });
        actionsBar.appendChild(editBtn); actionsBar.appendChild(saveBtn); actionsBar.appendChild(delBtn);
        info.appendChild(actionsBar);
      }
      if(r.responseText){
        const respWrap = el(`<div style="margin-top:4px"></div>`);
        respWrap.appendChild(el(`<span style="font-size:12px; color:var(--text-faint)">رد الأدمن: </span>`));
        respWrap.appendChild(buildExpandableNote(r.responseText, 90));
        info.appendChild(respWrap);
        const shareBtns = el(`<div class="share-btns no-print" style="margin-top:8px"></div>`);
        const shareText = `📢 رد الأدمن على طلب استئذانك (${r.occasion}):\n${r.responseText}`;
        const waBtn = el(`<button type="button" class="btn btn-ghost btn-sm">مشاركة واتساب</button>`);
        waBtn.addEventListener('click', ()=> window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank'));
        const tgBtn = el(`<button type="button" class="btn btn-ghost btn-sm">مشاركة تيليجرام</button>`);
        tgBtn.addEventListener('click', ()=> window.open(`https://t.me/share/url?url=&text=${encodeURIComponent(shareText)}`, '_blank'));
        const nativeBtn = el(`<button type="button" class="btn btn-ghost btn-sm">مشاركة أخرى</button>`);
        nativeBtn.addEventListener('click', async ()=>{
          if(navigator.share){ try{ await navigator.share({title:'رد الأدمن', text:shareText}); }catch(e){} }
          else { navigator.clipboard.writeText(shareText); alert('تم نسخ النص، يمكنك لصقه في أي تطبيق'); }
        });
        shareBtns.appendChild(waBtn); shareBtns.appendChild(tgBtn); shareBtns.appendChild(nativeBtn);
        info.appendChild(shareBtns);
      }
      wrap.appendChild(row);
    });
  }
  return card;
}

/* ---- متابعة الغياب المتكرر (مرتين فأكثر) ---- */
function computeAbsentees(sup){
  const counts = {};
  Object.values(sup.attendance).forEach(rec=>{
    Object.entries(rec).forEach(([memberId, entry])=>{
      if(entry && entry.present===false) counts[memberId] = (counts[memberId]||0)+1;
    });
  });
  return sup.members
    .filter(m=>(counts[m.id]||0)>=2)
    .map(m=>({...m, absenceCount:counts[m.id]}))
    .sort((a,b)=>b.absenceCount-a.absenceCount);
}
function totalDonationsForMember(sup, memberId){
  let total = 0;
  Object.values(sup.attendance).forEach(rec=>{
    if(rec[memberId]) total += rec[memberId].donation || 0;
  });
  return total;
}

function renderAbsenteesPanel(sup){
  const list = computeAbsentees(sup);
  const panel = el(`<div class="card">
    <div class="card-head"><div><h2>متابعة الغياب المتكرر</h2><div class="sub">الأعضاء الذين تغيبوا مرتين أو أكثر عن حلقة الذكر</div></div></div>
    <div id="absWrap"></div>
  </div>`);
  const wrap = panel.querySelector('#absWrap');
  if(list.length===0){
    wrap.appendChild(el(`<div class="empty-state">لا يوجد حالياً أي عضو تجاوز غيابه مرتين، الحمد لله.</div>`));
  } else {
    list.forEach(m=>{
      const row = el(`<div class="member-row">
        <div class="member-info"><b>${m.name}</b><span>${m.phone||'بدون رقم'} · غاب ${m.absenceCount} ${m.absenceCount===2?'مرتين':'مرات'}</span></div>
        <div class="row-actions">
          ${m.phone? `<a class="btn btn-ghost btn-sm" href="tel:${m.phone}">📞 اتصال</a>
          <a class="btn btn-primary btn-sm" target="_blank" rel="noopener" href="https://wa.me/${toIntlPhone(m.phone)}?text=${encodeURIComponent(DB.absenceMessage||'')}">💬 إرسال الرسالة</a>`
          : '<span class="badge badge-dim">لا يوجد رقم هاتف</span>'}
        </div>
      </div>`);
      wrap.appendChild(row);
    });
  }
  return panel;
}

/* ---- Share & Print panel ---- */
function buildAttendanceText(sup, date){
  const record = sup.attendance[date] || {};
  const present = sup.members.filter(m=>record[m.id] && record[m.id].present);
  const absent = sup.members.filter(m=>!(record[m.id] && record[m.id].present));
  const donationsSum = Object.values(record).reduce((a,v)=>a+(v.donation||0),0);
  let txt = `📋 قائمة حضور — سجل المذكرين والمتذاكرين بالأمر الرباني\n`;
  txt += `👤 المسؤول: ${sup.fullName}\n📍 ${sup.province} - ${sup.region}\n🗓️ التاريخ: ${fmtDate(date)}\n\n`;
  txt += `✅ الحاضرون (${present.length}):\n`;
  txt += present.length? present.map((m,i)=>`${i+1}. ${m.name}`).join('\n') : "لا يوجد";
  txt += `\n\n❌ الغائبون (${absent.length}):\n`;
  txt += absent.length? absent.map((m,i)=>`${i+1}. ${m.name}`).join('\n') : "لا يوجد";
  txt += `\n\nإجمالي الأعضاء: ${sup.members.length}`;
  if(donationsSum>0) txt += `\n💰 إجمالي الصدقات: ${donationsSum}`;
  txt += `\nتوقيع: حمزة فلاح`;
  return txt;
}

/* ============================= الإشعارات الفورية (Web Push) ============================= */
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));
}
async function isPushSubscribed(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  return !!sub;
}
async function subscribeToPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    alert('هذا المتصفح لا يدعم الإشعارات الفورية.');
    return false;
  }
  const permission = await Notification.requestPermission();
  if(permission!=='granted'){ alert('لم تُمنح صلاحية الإشعارات.'); return false; }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if(!sub){
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
  }
  const json = sub.toJSON();
  const {error} = await sb.from('push_subscriptions').upsert({
    endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth
  }, {onConflict:'endpoint'});
  if(error){ console.error(error); return false; }
  return true;
}
/* استدعاء دالة الخادم المصغّرة (Edge Function) لإرسال الإشعار الفعلي لكل المشتركين */
async function triggerPushBroadcast(message){
  try{
    await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
      method:'POST',
      headers:{'Content-Type':'application/json', 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
      body: JSON.stringify({message})
    });
  }catch(e){ console.error('تعذر إرسال الإشعار الفوري (تأكد من نشر send-push):', e); }
}
